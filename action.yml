name: "Claude PR Reviewer"
description: "Ultra-fast AI code reviews on Pull Requests using the Anthropic Claude API."
author: "vparlici"

branding:
  icon: "eye"
  color: "purple"

inputs:
  anthropic-api-key:
    description: "Anthropic API key used to call the Claude Messages API."
    required: true
  github-token:
    description: "GitHub token used to read PR files and post the review comment."
    required: false
    default: ${{ github.token }}
  model:
    description: "Claude model ID used for the review (e.g. claude-sonnet-5, claude-haiku-4-5, claude-opus-4-8)."
    required: false
    default: "claude-sonnet-5"
  max-tokens:
    description: "Maximum tokens for the review response (thinking + output). Invalid values fall back to the default."
    required: false
    default: "8192"

runs:
  using: "docker"
  # Pre-built image pulled from GHCR — no compilation at run time.
  # Published by .github/workflows/release.yml on each version tag.
  image: "docker://ghcr.io/vparlici/claude-pr-reviewer:v1"
  env:
    ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
    GITHUB_TOKEN: ${{ inputs.github-token }}
    CLAUDE_MODEL: ${{ inputs.model }}
    CLAUDE_MAX_TOKENS: ${{ inputs.max-tokens }}
